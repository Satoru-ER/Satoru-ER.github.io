<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Book UI</title>
<style>
:root {
  color-scheme: light;
  --primary: #6750a4;
  --on-primary: #ffffff;
  --primary-container: #eaddff;
  --on-primary-container: #21005d;
  --surface: #fef7ff;
  --surface-variant: #f3edf7;
  --on-surface: #1d1b20;
  --outline: #79747e;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "SF Pro Text", "Roboto", "Noto Sans JP", sans-serif;
  color: var(--on-surface);
  background:
    radial-gradient(circle at 15% 10%, rgba(173, 129, 255, 0.30), transparent 35%),
    radial-gradient(circle at 88% 18%, rgba(120, 184, 255, 0.24), transparent 34%),
    radial-gradient(circle at 60% 90%, rgba(255, 163, 206, 0.22), transparent 35%),
    linear-gradient(160deg, #f7f3ff 0%, #f7fbff 46%, #f8f2ff 100%);
  display: flex;
  justify-content: center;
  padding: 28px 16px;
}

.app {
  width: min(980px, 100%);
}

header {
  padding: 20px 24px;
  border-radius: 30px;
  font-size: clamp(1.15rem, 2.4vw, 1.45rem);
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--on-primary-container);
  background: linear-gradient(120deg, rgba(234, 221, 255, 0.88), rgba(214, 196, 255, 0.66));
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border: 1px solid rgba(255, 255, 255, 0.54);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.7),
    0 10px 28px rgba(86, 61, 151, 0.18);
}

.card {
  margin-top: 14px;
  display: grid;
  grid-template-columns: minmax(220px, 330px) 1fr;
  gap: 20px;
  padding: clamp(20px, 3vw, 30px);
  border-radius: 38px 22px 38px 22px;
  background: linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.50),
      rgba(255, 255, 255, 0.28)
    ),
    color-mix(in srgb, var(--surface-variant) 82%, white 18%);
  backdrop-filter: blur(24px) saturate(150%);
  -webkit-backdrop-filter: blur(24px) saturate(150%);
  border: 1px solid rgba(255, 255, 255, 0.58);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.72),
    0 6px 20px rgba(61, 52, 83, 0.14),
    0 20px 40px rgba(89, 73, 140, 0.16);
}

.book-image {
  width: 100%;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  border-radius: 22px;
  border: 1px solid rgba(255, 255, 255, 0.55);
  box-shadow: 0 8px 24px rgba(34, 29, 48, 0.20);
}

.eyebrow {
  margin: 2px 0 10px;
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #4a4458;
}

.title {
  margin: 0 0 10px;
  font-size: clamp(1.45rem, 3vw, 2rem);
  font-weight: 700;
  line-height: 1.3;
}

.desc {
  margin: 0 0 18px;
  font-size: clamp(0.98rem, 2.1vw, 1.08rem);
  line-height: 1.8;
  color: #49454f;
}

.desc {
  margin: 0 0 18px;
  font-size: clamp(0.98rem, 2.1vw, 1.1rem);
  line-height: 1.8;
  color: #49454f;
}

.tag {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--on-primary);
  background: var(--primary);
  box-shadow: 0 6px 12px rgba(103, 80, 164, 0.32);
}

@media (max-width: 760px) {
  body {
    padding: 18px 12px;
  }

  .card {
    grid-template-columns: 1fr;
    border-radius: 26px;
  }

  .book-image {
    max-height: 360px;
  }
}
</style>
</head>
<body>
<div class="app">
  <header>📚 BOOK UI</header>

  <section class="card" aria-live="polite">
    <img
      class="book-image"
      src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=800&q=80"
      alt="本のイメージ"
    />

    <div>
      <p class="eyebrow">Featured Book</p>
      <h1 class="title">嫌われる勇気</h1>
      <p class="desc">アドラー心理学をベースにした対話形式の本。過去ではなく「これからどう生きるか」に焦点を当て、自分の選択で人生を変えられることを教えてくれる一冊。</p>
      <span class="tag">心理学</span>
    </div>
  </section>
</div>
</body>
</html>
