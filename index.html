<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Book UI</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

header {
  background: #222;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

/* サイドバー */
.sidebar {
  width: 220px;
  background: #333;
  color: white;
  padding: 10px;
}

.book-btn {
  display: block;
  padding: 10px;
  margin: 8px 0;
  background: #444;
  cursor: pointer;
  border-radius: 6px;
}

.book-btn:hover {
  background: #666;
}

/* メイン */
.main {
  flex: 1;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.title {
  font-size: 24px;
  margin-bottom: 10px;
}

.tag {
  display: inline-block;
  background: #0078ff;
  color: white;
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 12px;
}
</style>
</head>

<body>

<header>
📚 BOOK UI - 本紹介システム
</header>

<div class="container">

  <!-- サイドバー -->
  <div class="sidebar">
    <div class="book-btn" onclick="showBook(0)">嫌われる勇気</div>
    <div class="book-btn" onclick="showBook(1)">君の名は。</div>
    <div class="book-btn" onclick="showBook(2)">ノルウェイの森</div>
  </div>

  <!-- メイン -->
  <div class="main">
    <div class="card">
      <div class="title" id="title">本を選択してね</div>
      <div id="desc">左から本をクリックすると詳細が出るよ</div>
      <div id="tag"></div>
    </div>
  </div>

</div>

<script>
const books = [
  {
    title: "嫌われる勇気",
    desc: "アドラー心理学をベースにした対話形式の本。自分の生き方を考えさせられる。",
    tag: "心理学"
  },
  {
    title: "君の名は。",
    desc: "入れ替わりをテーマにした青春SFストーリー。映画でも有名。",
    tag: "小説"
  },
  {
    title: "ノルウェイの森",
    desc: "青春と喪失を描いた村上春樹の代表作。",
    tag: "文学"
  }
];

function showBook(i) {
  document.getElementById("title").innerText = books[i].title;
  document.getElementById("desc").innerText = books[i].desc;
  document.getElementById("tag").innerHTML = `<span class="tag">${books[i].tag}</span>`;
}
</script>

</body>
</html>
