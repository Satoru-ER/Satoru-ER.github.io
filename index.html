<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Book UI - Material 3 Expressive</title>
<style>
:root {
  color-scheme: light;
  --md-sys-color-primary: #6750a4;
  --md-sys-color-on-primary: #ffffff;
  --md-sys-color-primary-container: #eaddff;
  --md-sys-color-on-primary-container: #21005d;
  --md-sys-color-secondary-container: #e8def8;
  --md-sys-color-on-secondary-container: #1d192b;
  --md-sys-color-surface: #fef7ff;
  --md-sys-color-surface-container: #f3edf7;
  --md-sys-color-on-surface: #1d1b20;
  --md-sys-color-outline: #79747e;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Roboto", "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
  background: radial-gradient(circle at 0% 0%, #f6edff 0%, var(--md-sys-color-surface) 45%, #eef2ff 100%);
  color: var(--md-sys-color-on-surface);
  min-height: 100vh;
}

header {
  margin: 24px auto 0;
  width: min(980px, calc(100% - 32px));
  background: linear-gradient(120deg, var(--md-sys-color-primary-container), #d0bcff);
  color: var(--md-sys-color-on-primary-container);
  border-radius: 32px;
  padding: 22px 28px;
  font-size: clamp(1.1rem, 2.4vw, 1.5rem);
  font-weight: 700;
  letter-spacing: 0.04em;
  box-shadow: 0 4px 10px rgba(103, 80, 164, 0.2);
}

.container {
  width: min(980px, calc(100% - 32px));
  margin: 16px auto 24px;
}

.card {
  display: grid;
  grid-template-columns: minmax(220px, 340px) 1fr;
  gap: 20px;
  background: color-mix(in srgb, var(--md-sys-color-surface-container) 90%, white 10%);
  border: 1px solid color-mix(in srgb, var(--md-sys-color-outline) 25%, transparent 75%);
  border-radius: 36px 22px 36px 22px;
  padding: clamp(20px, 3vw, 30px);
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.08);
}

.book-image-wrap {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.book-image {
  width: 100%;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  border-radius: 20px;
  background: #ddd6e8;
  border: 1px solid rgba(103, 80, 164, 0.24);
}

.upload-label {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  border-radius: 999px;
  padding: 10px 14px;
  background: var(--md-sys-color-secondary-container);
  color: var(--md-sys-color-on-secondary-container);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
}

.upload-input {
  display: none;
}

.note {
  margin: 0;
  color: #625b71;
  font-size: 0.8rem;
}

.eyebrow {
  color: #4a4458;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.title {
  font-size: clamp(1.45rem, 3vw, 2rem);
  line-height: 1.3;
  font-weight: 700;
  margin-bottom: 10px;
}

.desc {
  margin: 0 0 18px;
  font-size: clamp(0.98rem, 2.1vw, 1.1rem);
  line-height: 1.8;
  color: #49454f;
}

.tag {
  display: inline-block;
  background: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
  padding: 6px 12px;
  border-radius: 100px;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}

@media (max-width: 760px) {
  .card {
    grid-template-columns: 1fr;
    border-radius: 26px;
  }

  .book-image {
    max-height: 360px;
  }
}
</style>
</head>

<body>
<header>📚 BOOK UI - Material 3 Expressive</header>

<div class="container">
  <section class="card" aria-live="polite">
    <div class="book-image-wrap">
      <img
        id="bookImage"
        class="book-image"
        src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=800&q=80"
        alt="本のイメージ"
      />
      <label class="upload-label" for="imageInput">画像を選択</label>
      <input class="upload-input" id="imageInput" type="file" accept="image/*" />
      <p class="note">※ 端末の画像を選ぶと、この画面の本画像を差し替えできます。</p>
    </div>

    <div>
      <div class="eyebrow">Featured Book</div>
      <div class="title">嫌われる勇気</div>
      <p class="desc">アドラー心理学をベースにした対話形式の本。過去ではなく「これからどう生きるか」に焦点を当て、自分の選択で人生を変えられることを教えてくれる一冊。</p>
      <span class="tag">心理学</span>
    </div>
  </section>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const bookImage = document.getElementById("bookImage");

imageInput.addEventListener("change", (event) => {
  const file = event.target.files?.[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    if (typeof e.target?.result === "string") {
      bookImage.src = e.target.result;
      bookImage.alt = file.name;
    }
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
