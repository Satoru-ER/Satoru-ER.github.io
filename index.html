<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>本の紹介</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: light;
  --primary: #8b5cf6;
  --on-primary: #ffffff;
  --primary-container: #f3e8ff;
  --on-primary-container: #2d1b69;
  --secondary: #6b4eff;
  --on-secondary: #ffffff;
  --secondary-container: #e8ddff;
  --on-secondary-container: #1e0061;
  --tertiary: #7c4dff;
  --on-tertiary: #ffffff;
  --tertiary-container: #f0deff;
  --on-tertiary-container: #29005c;
  --surface: #fef7ff;
  --surface-variant: #f3edf7;
  --on-surface: #1d1b20;
  --on-surface-variant: #4a4458;
  --outline: #79747e;
  --outline-variant: #cac4d0;
  --error: #ba1a1a;
  --on-error: #ffffff;
  --error-container: #ffdad6;
  --on-error-container: #410002;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Roboto Flex', 'Roboto', 'Noto Sans JP', sans-serif;
  color: var(--on-surface);
  background:
    radial-gradient(circle at 15% 10%, rgba(139, 92, 246, 0.30), transparent 35%),
    radial-gradient(circle at 88% 18%, rgba(107, 78, 255, 0.24), transparent 34%),
    radial-gradient(circle at 60% 90%, rgba(124, 77, 255, 0.22), transparent 35%),
    linear-gradient(160deg, #f7f3ff 0%, #f7fbff 46%, #f8f2ff 100%);
  display: flex;
  justify-content: center;
  padding: 28px 16px;
}

.app {
  width: min(980px, 100%);
}

header {
  padding: 20px 24px;
  border-radius: 30px;
  font-size: clamp(1.15rem, 2.4vw, 1.45rem);
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--on-primary-container);
  background: linear-gradient(120deg, rgba(243, 232, 255, 0.88), rgba(232, 221, 255, 0.66));
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border: 1px solid rgba(255, 255, 255, 0.54);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.7),
    0 10px 28px rgba(139, 92, 246, 0.18);
}

.card {
  margin-top: 14px;
  display: grid;
  grid-template-columns: minmax(220px, 330px) 1fr;
  gap: 20px;
  padding: clamp(20px, 3vw, 30px);
  border-radius: 38px 22px 38px 22px;
  background: linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.50),
      rgba(255, 255, 255, 0.28)
    ),
    color-mix(in srgb, var(--surface-variant) 82%, white 18%);
  backdrop-filter: blur(24px) saturate(150%);
  -webkit-backdrop-filter: blur(24px) saturate(150%);
  border: 1px solid rgba(255, 255, 255, 0.58);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.72),
    0 6px 20px rgba(139, 92, 246, 0.14),
    0 20px 40px rgba(107, 78, 255, 0.16);
}

.book-image {
  width: 100%;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  border-radius: 22px;
  border: 1px solid rgba(255, 255, 255, 0.55);
  box-shadow: 0 8px 24px rgba(34, 29, 48, 0.20);
}

.eyebrow {
  margin: 2px 0 10px;
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #4a4458;
}

.title {
  margin: 0 0 10px;
  font-size: clamp(1.45rem, 3vw, 2rem);
  font-weight: 700;
  line-height: 1.3;
}

.desc {
  margin: 0 0 18px;
  font-size: clamp(0.98rem, 2.1vw, 1.08rem);
  line-height: 1.8;
  color: #49454f;
}

.tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap; /* 画面狭くても折り返す */
}

.tag {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--on-primary);
  background: var(--primary);
  box-shadow: 0 6px 12px rgba(0, 0, 0, 0.32);
}

@media (max-width: 760px) {
  body {
    padding: 18px 12px;
  }

  .card {
    grid-template-columns: 1fr;
    border-radius: 26px;
  }

  .book-image {
    max-height: 360px;
  }
}
</style>
</head>
<body>
<div class="app">
  <header><span class="material-symbols-outlined" style="font-size: 1.2em; vertical-align: middle;">book</span> 本の紹介</header>
  <section class="card" aria-live="polite">
    <img
      class="book-image"
      src="/01.jpg"
      alt="「嫌われる勇気」という本が、表紙をこちらに向けて立てておいてある。"
    />
    <div>
      <p class="eyebrow">Featured Book</p>
      <h1 class="title">嫌われる勇気</h1>
      <p class="desc">皆さん！対人関係も「冬」を迎えていませんか？<br>この本では、人間関係の悩みを過去や他人の評価にとらわれるのではなく、「今の自分の行動」に注目して考えることの大切さを紹介しています。<br>過去にとらわれず、他人の評価に振り回されず、「今どうするか」を大事にすることがポイントです。<br>人間関係に悩んだときに、自分の考え方を整理するきっかけになる本です。</p>
      <div class="tags">
        <span class="tag">心理学</span>
        <span class="tag">自己啓発</span>
        <span class="tag">対人関係</span>
      </div>
    </div>
  </section>
</div>
</body>
</html>
