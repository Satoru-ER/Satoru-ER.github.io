<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satoru | Official</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.glass {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    width: 90%;
    max-width: 500px;
}

h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
}

p {
    opacity: 0.8;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 30px;
    border: none;
    background: white;
    color: black;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="glass">
    <h1>Hi, I'm Satoru.</h1>
    <p>Student / Creator / Future Builder</p>
    <button onclick="alert('Welcome to Satoru World 🚀')">Enter</button>
</div>

</body>
</html>
